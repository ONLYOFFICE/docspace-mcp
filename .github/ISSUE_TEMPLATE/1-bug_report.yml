name: Bug report
description: Report a bug or unexpected behavior in this integration.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. For general usage or configuration questions, try the [Community Forum](https://community.onlyoffice.com/) or [API documentation](https://api.onlyoffice.com/docspace/) instead.
  - type: checkboxes
    id: duplicate_check
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: input
    id: system_version
    attributes:
      label: System version
      description: "Version of the system where the integration is installed (e.g. WordPress 7.0.1, Moodle 5.2.1)."
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: "Version of this integration."
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: input
    id: docspace_version
    attributes:
      label: ONLYOFFICE DocSpace version
      placeholder: "e.g. 3.7.1"
    validations:
      required: true
  - type: textarea
    id: issue_summary
    attributes:
      label: What happened?
      placeholder: "Describe the problem in detail and when it occurs."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "Describe the expected result after completing the steps above."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 / macOS 14.5 / Ubuntu 24.04
        - Browser: Chrome 126 / Firefox 128 / Safari 17.5
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      placeholder: |
        Attach:
        - integration logs;
        - ONLYOFFICE DocSpace logs;
        - browser console;
        - network trace (optional).
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      placeholder: "Attach or paste any relevant screenshots."
